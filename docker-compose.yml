version: '3.8'

services:

  app:
    image: soumipandit/quicknotes-flask-mysql-docker:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: quicknotes_db
      MYSQL_USER: notesuser
      MYSQL_PASSWORD: notespass
    volumes:
      - quicknotes_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unotesuser", "-pnotespass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  quicknotes_mysql_data:
